name: CI

# Runs on every PR and push to main. Also callable by the deploy workflows
# (workflow_call) so a deploy only proceeds when this exact test gate passes.
on:
  pull_request:
  push:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: pytest (Python 3.14)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install package + dev deps
        run: pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest tests/ -q

  cdk-synth:
    name: cdk synth (build check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install CDK deps
        run: pip install -e ".[cdk]"
      - name: Synthesize the stack (no AWS credentials needed)
        working-directory: infrastructure
        run: npx --yes aws-cdk@2 synth --all
