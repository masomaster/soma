name: Deploy production

# Production is never deployed silently: it runs only on a manual dispatch or a
# version tag push, and the `production` GitHub Environment should require
# reviewer approval. The reusable CI gate must pass first. Auth is GitHub OIDC
# -> AWS IAM role. Configure the `production` GitHub Environment with:
#   - AWS_DEPLOY_ROLE_ARN  (IAM role the production environment may assume)
#   - AWS_REGION           (optional; defaults to us-west-2)
#   - required reviewers (Settings -> Environments -> production)
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: cdk deploy SomaProdStack
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write # required for OIDC token
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install CDK deps
        run: pip install -e ".[cdk]"
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-west-2' }}
      - name: Resolve account id for CDK env
        run: echo "CDK_DEFAULT_ACCOUNT=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_ENV"
      - name: Deploy SomaProdStack
        working-directory: infrastructure
        env:
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
        run: npx --yes aws-cdk@2 deploy SomaProdStack --require-approval never
